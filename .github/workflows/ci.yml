name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Version comes from the root package.json `packageManager` field
      # (`pnpm@9.15.0`). Don't set `version:` here — action-setup@v4 errors
      # if both sources are present.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - name: Build web
        env:
          # Build-time placeholders so Next can finish prerendering. The
          # values aren't valid at runtime — production sets the real ones.
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_ADMIN_EMAILS: ci@example.com
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: pnpm --filter @cfo/web build

      - name: Build agent
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
        run: pnpm --filter @cfo/agent build
